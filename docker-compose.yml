version: '3.8'

services:
  research-assistant:
    build: .
    image: research-assistant:latest
    container_name: research-assistant
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  oneagent:
    image: dynatrace/oneagent:latest
    container_name: oneagent
    restart: unless-stopped
    privileged: true
    pid: "host"
    network_mode: host
    read_only: true
    security_opt:
      - apparmor:unconfined
    env_file: .env
    environment:
      ONEAGENT_INSTALLER_SCRIPT_URL: ${ONEAGENT_INSTALLER_SCRIPT_URL}
      ONEAGENT_INSTALLER_DOWNLOAD_TOKEN: ${ONEAGENT_INSTALLER_DOWNLOAD_TOKEN}
      ONEAGENT_ENABLE_VOLUME_STORAGE: "true"
    volumes:
      - /:/mnt/root
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/opt/dynatrace:/mnt/volume_storage_mount
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
